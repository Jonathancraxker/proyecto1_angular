<div class="card sticky top-0 z-50 w-full shadow-md">
            <p-menubar [model]="items">
                <ng-template #start>
                    <span class="inline-flex items-center gap-1 px-2 py-2">
                        <span routerLink="/home" class="text-xl font-semibold cursor-pointer">ANTEIKU <span class="cursor-pointer" style="color: #6F4E37">APP</span></span><span class="ml-4"></span>
                    </span>
                </ng-template>
                <ng-template #item let-item let-root="root">
                    <a pRipple [routerLink]="item.routerLink" routerLinkActive="active-cafe" [routerLinkActiveOptions]="{exact: true}" [class]="item.linkClass"  class="flex items-center px-4 py-3 cursor-pointer gap-2 no-underline text-inherit">
                        <span [class]="item.icon"></span>
                        <span class="font-medium">{{ item.label }}</span>
                        <p-badge *ngIf="item.badge" [ngClass]="{ 'ms-auto': !root }" [value]="item.badge" />
                        <i *ngIf="item.items" [ngClass]="['ms-auto pi', root ? 'pi-angle-down' : 'pi-angle-right']"></i>
                    </a>
                </ng-template>
                <ng-template #end>
                    <div class="flex items-center gap-2">
                        <input type="text" pInputText placeholder="Search" class="w-36" />
                        <p-avatar image="assets/images/dukii.jpg" shape="circle" />
                    </div>
                </ng-template>
            </p-menubar>
        </div>
