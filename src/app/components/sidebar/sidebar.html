<div class="flex flex-col h-full">
            <p-menu [model]="items" styleClass="w-full md:w-60 h-full flex flex-col">
                <!-- <ng-template #start>
                    <span class="inline-flex items-center gap-1 px-2 py-2">
                        <span routerLink="/home" class="text-xl font-semibold cursor-pointer">ANTEIKU<span class="cursor-pointer" style="color: #6F4E37">APP</span></span>
                    </span>
                </ng-template> -->
                <ng-template #submenuheader let-item>
                    <span class="font-bold">{{ item.label }}</span>
                </ng-template>
                <ng-template #item let-item>
                    <a pRipple 
                        [routerLink]="item.routerLink"
                        [routerLinkActiveOptions]="{exact: true}"
                        routerLinkActive="active-cafe" 
                        class="flex items-center px-3 py-2 cursor-pointer no-underline text-inherit transition-colors"
                        [class]="item.linkClass">                       
                            <span [class]="item.icon"></span> 
                            <span class="ml-2 font-medium">{{ item.label }}</span> 
                            
                            <span *ngIf="item.shortcut" class="ml-auto border border-surface rounded bg-emphasis text-muted-color text-xs p-1">
                                {{ item.shortcut }}
                            </span>
                    </a>
                </ng-template>
            </p-menu>
</div>
