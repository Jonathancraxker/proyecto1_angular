<div class="p-4">
    <p-toast />
    
    <div class="card p-4 shadow-2 border-round surface-card">
        <div class="flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="text-3xl font-bold m-0 text-white">Gestión Global de Usuarios</h2>
                <p class="text-secondary m-0">Panel de Control para SuperAdmin</p>
            </div>
            <p-button *ifHasPermission="'users:add'" label="Nuevo Usuario" icon="pi pi-user-plus" (onClick)="openNew()" />
        </div>

        <p-table #dt [value]="users" [rows]="10" [paginator]="true" [globalFilterFields]="['nombre', 'email']" 
                 styleClass="p-datatable-sm p-datatable-gridlines">
            
            <ng-template #header>
                <tr>
                    <th pSortableColumn="nombre">Nombre <p-sortIcon field="nombre" /></th>
                    <th pSortableColumn="email">Email <p-sortIcon field="email" /></th>
                    <th>Permisos Asignados (Roles)</th>
                    <th>Acciones</th>
                </tr>
            </ng-template>

            <ng-template #body let-u>
                <tr class="text-gray-300">
                    <td class="font-bold text-white">{{ u.nombre }}</td>
                    <td>{{ u.email }}</td>
                    <td>
                        <div class="flex flex-wrap gap-1">
                            @for (permiso of u.permisos; track permiso) {
                                <p-tag [value]="permiso" severity="secondary" />
                            } @empty {
                                <span class="text-xs italic text-gray-500">Sin permisos asignados</span>
                            }
                        </div>
                    </td>
                    <td>
                        <p-button *ifHasPermission="'users:edit'" icon="pi pi-pencil" [rounded]="true" [outlined]="true" class="mr-2" (onClick)="editUser(u)" />
                        <p-button *ifHasPermission="'users:delete'" icon="pi pi-trash" severity="danger" [rounded]="true" [outlined]="true" (onClick)="deleteUser(u)" />
                    </td>
                </tr>
            </ng-template>
        </p-table>
    </div>
</div>

<p-dialog [(visible)]="userDialog" [header]="'Configurar Usuario'" [modal]="true" [style]="{ width: '450px' }" styleClass="p-fluid">
    <ng-template #content>
        <div class="field mb-3">
            <label class="block font-bold mb-2">Nombre Completo</label>
            <input type="text" pInputText [(ngModel)]="user.nombre" required autofocus />
        </div>
        <div class="field mb-3">
            <label class="block font-bold mb-2">Email</label>
            <input type="email" pInputText [(ngModel)]="user.email" required />
        </div>
        
        <div class="field">
            <label class="block font-bold mb-2 text-primary">Gestionar Permisos</label>
            <p-multiselect [options]="permisosDisponibles" 
                           [(ngModel)]="user.permisos" 
                           optionLabel="name" 
                           optionValue="code"
                           placeholder="Asignar permisos al usuario" 
                           display="chip" 
                           class="w-full" />
        </div>
    </ng-template>

    <ng-template #footer>
        <p-button label="Cancelar" icon="pi pi-times" text (onClick)="userDialog = false" />
        <p-button label="Guardar Usuario" icon="pi pi-check" (onClick)="saveUser()" />
    </ng-template>
</p-dialog>

<p-confirmdialog />
