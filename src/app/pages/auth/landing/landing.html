<div class="min-h-screen flex flex-column">
    <section class="surface-0 flex-grow-1 flex align-items-center py-8 px-6 lg:px-8" 
             style="background: linear-gradient(135deg, #e2c6a1 0%, #6F4E37 100%);">
        
        <div class="grid grid-nogutter justify-content-between align-items-center w-full">
            
            <div class="col-12 lg:col-6 text-center lg:text-left">
                
                <h1 class="text-7xl font-bold text-100 mb-4 line-height-1">
                    Gestiona tu <br/>
                    <span style="color: #6F4E37">Aplicación</span>
                </h1>
                
                <p class="text-xl text-100 mb-6 line-height-3 max-w-30rem mx-auto lg:mx-0">
                    Bienvenido, <span class="font-bold text-100">{{ usuario }}</span>. Estás visualizando la app
                    <span class="font-medium underline cursor-pointer">{{ nombreProyecto }}</span>. 
                </p>

                <div class="flex flex-column sm:flex-row gap-3 justify-content-center lg:justify-content-start">
                    <p-button label="Inicia sesión" routerLink="" icon="pi pi-sign-in"
                              styleClass="p-button-lg shadow-4 border-none" 
                              [style]="{'background-color': '#6F4E37', 'padding': '1rem 2rem'}">
                    </p-button>
                    <p-button label="Registrarse" routerLink="/register" icon="pi pi-user-plus" 
                              severity="contrast" 
                              styleClass="p-button-lg shadow-4 border-none" 
                              [style]="{'border-color': '#6F4E37', 'padding': '1rem 2rem'}">
                    </p-button>
                </div>
            </div>

            <div class="col-12 lg:col-5 mt-8 lg:mt-0 relative">
                <div class="absolute w-full h-full bg-brown-100 border-round-3xl" 
                     style="background-color: #6F4E37; opacity: 0.1; transform: rotate(-3deg); top: 10px; left: 10px;">
                </div>
                
                <div class="relative z-1 shadow-8 border-round-3xl overflow-hidden surface-card flex align-items-center justify-content-center" 
                     style="min-height: 400px; border: 8px solid #6F4E37;">
                    <div class="text-center p-6">
                        <i class="pi pi-users text-8xl mb-4" style="color: #6F4E37"></i>
                        <div class="text-2xl font-bold text-900">Bienvenido</div>
                        <p class="text-600 mt-2">Inicia sesión para comenzar a usar la aplicación</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="py-4 text-center surface-60 border-top-1 border-200">
        <p class="text-500 text-sm">© 2026 Universidad Tecnológica de Querétaro - {{ usuario }}</p>
    </footer>
</div>
