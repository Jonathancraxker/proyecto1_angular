<div class="p-4 flex flex-column gap-2">
    <div class="flex justify-content-between align-items-center mb-2">
        <div>
            <h2 class="text-3xl font-bold m-0 text-white">Dashboard del Grupo: {{groupId}}</h2>
        </div>
        <p-button *ifHasPermission="'group:add'" label="Crear Ticket" icon="pi pi-plus" (onClick)="crearTicket()"></p-button>
    </div>

    <p-tabs [value]="0">
        <p-tablist>
            <p-tab [value]="0" (click)="activeTab = 0" routerLink="resumen">Resumen</p-tab>
            <p-tab [value]="1" (click)="activeTab = 1" routerLink="kanban">Tablero Kanban</p-tab>
            <p-tab [value]="2" (click)="activeTab = 2" routerLink="lista">Vista de Lista</p-tab>
            <p-tab [value]="3" (click)="activeTab = 3" routerLink="users">Gestión - Grupo</p-tab>
        </p-tablist>
    </p-tabs>
    
    <router-outlet></router-outlet>

    <p-dialog [(visible)]="displayCreateModal" 
              header="Crear Nuevo Ticket" 
              [modal]="true" 
              [style]="{ width: '550px' }" 
              styleClass="p-fluid">
        
        <div class="flex flex-column gap-4 py-3">
            
            <div class="flex flex-column gap-2">
                <label class="font-bold text-sm text-white-alpha-80">Título del Ticket *</label>
                <input type="text" pInputText [(ngModel)]="nuevoTicket.titulo" 
                       placeholder="Ej: Tarea..." class="w-full" />
            </div>

            <div class="flex flex-column gap-2">
                <label class="font-bold text-sm text-white-alpha-80">Descripción</label>
                <textarea pTextarea [(ngModel)]="nuevoTicket.descripcion" 
                          rows="4" placeholder="Detalles de la tarea..." 
                          class="w-full" style="resize: none;"></textarea>
            </div>

            <div class="grid">
                <div class="col-6 flex flex-column gap-2">
                    <label class="font-bold text-sm text-white-alpha-80">Estado Inicial</label>
                    <p-select [options]="estados" [(ngModel)]="nuevoTicket.estado" 
                              placeholder="Seleccionar estado" class="w-full"></p-select>
                </div>
                <div class="col-6 flex flex-column gap-2">
                    <label class="font-bold text-sm text-white-alpha-80">Prioridad</label>
                    <p-select [options]="prioridades" [(ngModel)]="nuevoTicket.prioridad" 
                              placeholder="Seleccionar" class="w-full"></p-select>
                </div>
            </div>

            <div class="flex flex-column gap-2">
                <label class="font-bold text-sm text-white-alpha-80">Asignado a</label>
                <div class="p-inputgroup">
                    <span class="p-inputgroup-addon"><i class="pi pi-user"></i></span>
                    <input type="text" pInputText [(ngModel)]="nuevoTicket.responsable" 
                           placeholder="Nombre del usuario" class="w-full" />
                </div>
            </div>
        </div>

        <ng-template #footer>
            <div class="flex justify-content-end gap-2 pt-2">
                <p-button label="Cancelar" icon="pi pi-times" [text]="true" 
                          severity="secondary" (onClick)="displayCreateModal = false"></p-button>
                <p-button label="Crear" icon="pi pi-check" severity="primary"
                          (onClick)="guardarTicket()" [disabled]="!nuevoTicket.titulo"></p-button>
            </div>
        </ng-template>
    </p-dialog>
</div>
