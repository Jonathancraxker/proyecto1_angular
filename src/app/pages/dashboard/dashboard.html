<div class="p-4">
    <div class="flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="text-3xl font-bold m-0">Dashboard del Grupo: {{groupId}}</h2>
        </div>
        <p-button label="Crear Ticket" icon="pi pi-plus" (onClick)="crearTicket()"></p-button>
    </div>

    <p-tabs [value]="0" class="mb-4">
        <p-tablist>
            <p-tab [value]="0" (click)="activeTab = 0" routerLink="resumen">Resumen</p-tab>
            <p-tab [value]="1" (click)="activeTab = 1" routerLink="kanban">Tablero Kanban</p-tab>
            <p-tab [value]="2" (click)="activeTab = 2" routerLink="lista">Vista de Lista</p-tab>
            <p-tab [value]="3" (click)="activeTab = 3" routerLink="users">Gestión - Grupo</p-tab>
        </p-tablist>
    </p-tabs>
    
    <router-outlet></router-outlet>
    
</div>
