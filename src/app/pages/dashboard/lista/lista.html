@if (loading) {
        <div class="flex flex-column align-items-center justify-content-center py-8">
            <p-progressSpinner ariaLabel="loading" strokeWidth="4" />
            <span class="text-secondary mt-3">Cargando tickets...</span>
        </div>
    } @else {
<div class="flex flex-column align-items-center justify-content-center py-2 gap-4">
    <div class="w-full px-1" style="max-width: 95vw;">
        
        <div class="flex align-items-center gap-3 p-3 surface-card border-round shadow-2 mb-3" style="background-color: #1e1e1e; border: 1px solid #333;">
            <span class="text-secondary font-bold mr-2"><i class="pi pi-filter mr-1"></i> Filtros rápidos:</span>
            <p-selectButton 
                [options]="opcionesFiltro" 
                [(ngModel)]="filtroActivo" 
                optionLabel="label" 
                optionValue="value">
            </p-selectButton>
        </div>

        <div class="card p-4 shadow-2 border-round surface-card">            

            <p-table #dt [value]="ticketsFiltrados" [rows]="10" [paginator]="true" 
                     [globalFilterFields]="['id', 'titulo', 'responsable', 'estado']" 
                     [(selection)]="selectedTickets" [rowHover]="true" dataKey="id"
                     styleClass="p-datatable-sm">
                
                <ng-template #caption>
                    <div class="flex justify-content-between align-items-center mb-4">
                        <div class="flex align-items-center justify-content-between">
                            <h2 class="text-3xl font-bold m-0 text-white">Listado de Tickets</h2>
                        </div>
                    </div>

                    <div class="flex gap-3 mt-3 justify-content-end align-items-center">
                        <span class="text-secondary font-bold mr-2"><i class="pi pi-filter mr-1"></i> Filtrar por estado:</span>
                        <p-select [options]="statuses" (onChange)="dt.filter($event.value, 'estado', 'equals')" 
                        placeholder="Filtrar Estado" [showClear]="true" class="w-sm" appendTo="body"/>
                        <div class="flex align-items-end gap-2">
                            <p-iconfield>
                                        <p-inputicon class="pi pi-search" />
                                        <input pInputText type="text" (input)="dt.filterGlobal($event.target.value, 'contains')" placeholder="Buscar ticket..." />
                            </p-iconfield>
                        </div>
                    </div>
                </ng-template>

                <ng-template #header>
                    <tr>
                        <th style="width: 3rem"><p-tableHeaderCheckbox /></th>
                        <th pSortableColumn="id">ID <p-sortIcon field="id" /></th>
                        <th pSortableColumn="titulo">Título <p-sortIcon field="titulo" /></th>
                        <th pSortableColumn="estado">Estado <p-sortIcon field="estado" /></th>
                        <th pSortableColumn="asignado_nombre">Asignado <p-sortIcon field="asignado_nombre" /></th>
                        <th pSortableColumn="prioridad">Prioridad <p-sortIcon field="prioridad" /></th>
                        <th pSortableColumn="fechaLimite">Fecha Límite <p-sortIcon field="fechaLimite" /></th>
                        <th>Acciones</th>
                    </tr>
                </ng-template>

                <ng-template #body let-ticket>
    <tr>
        <td><p-tableCheckbox [value]="ticket" /></td>
        <td class="font-mono text-blue-400 font-bold">{{ ticket.id }}</td>
        <td class="font-medium">{{ ticket.titulo }}</td>
        <td>
            <p-tag [value]="ticket.estado" 
                   [style]="{'background': ticket.estado_color, 'color': '#ffffff'}" />
        </td>
        <td>
            <div class="flex align-items-center gap-2">
                <i class="pi pi-user text-xs text-secondary"></i>
                {{ ticket.asignado_nombre || 'Sin asignar' }}
            </div>
        </td>
        <td>
            <p-tag [value]="ticket.prioridad" [severity]="getSeverity(ticket.prioridad)" />
        </td>
        <td>{{ ticket.fecha_final | date:'dd/MM/yyyy' }}</td>
        <td>
            <!-- <p-button *ifHasPermission="'group:edit'" icon="pi pi-pencil" [rounded]="true" [outlined]="true" class="mr-2" (click)="editTicket(ticket)" /> -->
            <p-button *ifHasPermission="'group:delete'" icon="pi pi-trash" [rounded]="true" [outlined]="true" severity="danger" (click)="deleteTicket(ticket)" />
        </td>
    </tr>
</ng-template>
            </p-table>

            <p-dialog [(visible)]="ticketDialog" [style]="{ width: '500px' }" header="Detalle del Ticket" [modal]="true" styleClass="p-fluid">
                <ng-template #content>
                    <div class="flex flex-column gap-3">
                        <div>
                            <label class="block font-bold mb-1">Título</label>
                            <input type="text" pInputText [(ngModel)]="ticket.titulo" required autofocus class="w-full" />
                        </div>
                        <div>
                            <label class="block font-bold mb-1">Descripción</label>
                            <textarea pTextarea [(ngModel)]="ticket.descripcion" rows="3" class="w-full"></textarea>
                        </div>
                        <div class="grid">
                            <div class="col-6">
                                <label class="block font-bold mb-1">Estado</label>
                                <p-select [(ngModel)]="ticket.estado" [options]="statuses" placeholder="Selecciona" class="w-full"></p-select>
                            </div>
                            <div class="col-6">
                                <label class="block font-bold mb-1">Asignado</label>
                                <input type="text" pInputText [(ngModel)]="ticket.responsable" class="w-full" />
                            </div>
                        </div>
                    </div>
                </ng-template>
                <ng-template #footer>
                    <p-button label="Cancelar" icon="pi pi-times" text (click)="hideDialog()" />
                    <p-button label="Guardar" icon="pi pi-check" (click)="hideDialog()" />
                </ng-template>
            </p-dialog>

            <p-confirmdialog [style]="{ width: '450px' }" />
        </div>
    </div>
</div>
}
