<div class="card p-4 shadow-2 border-round surface-card mt-3">
    <p-toast />
    
    <div class="flex align-items-center justify-content-between mb-4 pb-3 border-bottom-1 border-gray-700">
        <div>
            <span class="text-secondary block mb-1">Configuración del Espacio</span>
            <h2 class="text-2xl font-bold m-0 text-white">{{groupName}}</h2>
        </div>
        <p-button *ifHasPermission="'group:edit'" icon="pi pi-pencil" label="Editar Grupo" severity="secondary" outlined (onClick)="editGroupName()" />
    </div>

    <p-toolbar class="mb-4">
        <ng-template #start>
            <p-button *ifHasPermission="'group:add'" label="Añadir por Email" icon="pi pi-user-plus" (onClick)="openNew()" />
        </ng-template>
    </p-toolbar>

    <p-table #dt [value]="users" [rows]="10" [paginator]="true" [globalFilterFields]="['nombre', 'email']" styleClass="p-datatable-sm">
        <ng-template #caption>
            <div class="flex items-center justify-between">
                <h5 class="m-0">Miembros del Grupo</h5>
                <p-iconfield>
                    <p-inputicon class="pi pi-search" />
                    <input pInputText type="text" (input)="dt.filterGlobal($any($event.target).value, 'contains')" placeholder="Buscar miembro..." />
                </p-iconfield>
            </div>
        </ng-template>

        <ng-template #header>
            <tr>
                <th pSortableColumn="nombre">Nombre <p-sortIcon field="nombre" /></th>
                <th pSortableColumn="email">Email <p-sortIcon field="email" /></th>
                <th pSortableColumn="rol">Rol <p-sortIcon field="rol" /></th>
                <th pSortableColumn="fechaIngreso">Fecha Ingreso <p-sortIcon field="fechaIngreso" /></th>
                <th>Acciones</th>
            </tr>
        </ng-template>

        <ng-template #body let-user>
            <tr class="text-gray-300">
                <td class="font-bold text-white">{{ user.nombre }}</td>
                <td>{{ user.email }}</td>
                <td><p-tag [value]="user.rol" [severity]="user.rol === 'Admin' ? 'danger' : 'info'" /></td>
                <td>{{ user.fechaIngreso }}</td>
                <td *ifHasPermission="'group:delete'">
                    <p-button icon="pi pi-trash" severity="danger" [rounded]="true" [outlined]="true" (click)="deleteUser(user)" />
                </td>
            </tr>
        </ng-template>
    </p-table>

    <p-dialog [(visible)]="userDialog" [style]="{ width: '400px' }" header="Añadir Miembro" [modal]="true" styleClass="p-fluid">
        <ng-template #content>
            <div class="field">
                <label class="font-bold">Email del Usuario</label>
                <input type="email" pInputText [(ngModel)]="user.email" placeholder="ejemplo@correo.com" />
                <small class="text-secondary">Se enviará una invitación a este correo.</small>
            </div>
            <div class="field mt-3">
                <label class="font-bold">Nombre (Opcional)</label>
                <input type="text" pInputText [(ngModel)]="user.nombre" />
            </div>
        </ng-template>
        <ng-template #footer>
            <p-button label="Cancelar" icon="pi pi-times" text (click)="userDialog = false" />
            <p-button label="Añadir" icon="pi pi-check" (click)="saveUser()" />
        </ng-template>
    </p-dialog>

    <p-confirmdialog [style]="{ width: '450px' }" />
</div>
