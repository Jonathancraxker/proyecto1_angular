<div class="p-5 relative" style="min-height: 400px;">
    <div class="flex flex-column gap-2 mb-4">
        <h1 class="text-4xl font-bold">Bienvenido de nuevo</h1>
        <p class="text-secondary">Selecciona un workspace para empezar a trabajar:</p>
    </div>

    @if (loading) {
        <div class="flex flex-column justify-content-center align-items-center py-8">
            <p-progressSpinner ariaLabel="loading" strokeWidth="4" />
            <span class="text-secondary mt-3">Cargando grupos...</span>
        </div>
    } @else {
        <div class="grid">
            @for (grupo of groups; track grupo.id) {
                <div class="col-12 md:col-6 lg:col-4">
                    <p-card [header]="grupo.nombre" styleClass="shadow-2 hover:shadow-4 border-round-xl transition-duration-150 surface-card">
                        <p class="m-0 mb-3 line-height-3" style="min-height: 3rem; color: #a0a0a0;">
                            {{ grupo.descripcion || 'Sin descripción' }}
                        </p>
                        
                        <div class="flex justify-content-between align-items-center mt-3 pt-3 border-top-1 surface-border">
                            <div style="max-width: 65%; overflow: hidden;">
                                <p class="m-0 text-sm font-medium">Creador:</p>
                                <p-tag [value]="grupo.creador_email" severity="info" icon="pi pi-user" [rounded]="true" styleClass="w-full white-space-nowrap overflow-hidden text-overflow-ellipsis block" styleClass="w-full white-space-nowrap overflow-hidden text-overflow-ellipsis block mt-1"></p-tag>
                            </div>
                            <p-button 
                                class="mt-3 md:mt-0"
                                severity="primary" 
                                label="Entrar" 
                                icon="pi pi-arrow-right" 
                                iconPos="right"
                                [outlined]="true"
                                (onClick)="entrarAlGrupo(grupo.id)">
                            </p-button>
                        </div>
                    </p-card>
                </div>
            } @empty {
                <div class="col-12 flex flex-column align-items-center justify-content-center py-8 text-center">
                    <i class="pi pi-folder-open text-6xl text-400 mb-4"></i>
                    <h2 class="text-2xl font-semibold text-600">No tienes grupos asignados</h2>
                </div>
            }
        </div>
    }
</div>
