<div class="p-5">
    <div class="flex flex-column gap-2 mb-4">
        <h1 class="text-4xl font-bold">Bienvenido, Jonathan</h1>
        <p class="text-secondary">Selecciona un grupo para gestionar sus tickets:</p>
    </div>

    <div class="grid">
        @for (grupo of groups; track grupo.id) {
            <div class="col-12 md:col-6 lg:col-4">
                <p-card [header]="grupo.nombre" styleClass="shadow-2 hover:shadow-4 transition-duration-150">
                    <p class="m-0 mb-3">{{ grupo.descripcion }}</p>
                    <div class="flex justify-content-between align-items-center">
                        <p-tag [value]="grupo.nivel" [severity]="getSeverity(grupo.nivel)"></p-tag>
                        <p-button severity='success' label="Entrar al Dashboard" icon="pi pi-external-link" (onClick)="entrarAlGrupo(grupo.id)"></p-button>
                    </div>
                </p-card>
            </div>
        }
    </div>
</div>
